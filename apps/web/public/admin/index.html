<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A Los Traques - Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #e0e0e0;
      min-height: 100vh;
    }
    #app { max-width: 1200px; margin: 0 auto; padding: 20px; }
    nav {
      display: flex;
      align-items: center;
      gap: 20px;
      padding: 16px 0;
      border-bottom: 1px solid #333;
      margin-bottom: 24px;
    }
    nav h1 { font-size: 18px; color: #ffd700; }
    nav a { color: #aaa; text-decoration: none; font-size: 14px; }
    nav a:hover, nav a.active { color: #fff; }
    .login-form {
      max-width: 400px;
      margin: 100px auto;
      padding: 32px;
      background: #16213e;
      border-radius: 8px;
    }
    .login-form h2 { margin-bottom: 16px; color: #ffd700; }
    .login-form input {
      width: 100%;
      padding: 10px;
      margin-bottom: 12px;
      background: #1a1a2e;
      border: 1px solid #333;
      border-radius: 4px;
      color: #fff;
      font-size: 14px;
    }
    .login-form button, .btn {
      padding: 10px 20px;
      background: #ffd700;
      color: #1a1a2e;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
    }
    .login-form button:hover, .btn:hover { background: #ffed4a; }
    .error { color: #ff6b6b; font-size: 13px; margin-top: 8px; }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }
    th, td {
      padding: 10px 12px;
      text-align: left;
      border-bottom: 1px solid #2a2a3e;
    }
    th { color: #ffd700; font-size: 12px; text-transform: uppercase; }
    tr:hover { background: #16213e; }
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 16px;
      margin-top: 20px;
    }
    .pagination button {
      padding: 8px 16px;
      background: #333;
      color: #fff;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .pagination button:disabled { opacity: 0.4; cursor: not-allowed; }
    .filters {
      display: flex;
      gap: 16px;
      align-items: center;
      margin-bottom: 16px;
    }
    .filters label { font-size: 13px; cursor: pointer; }
    .bundle-link {
      color: #4ecdc4;
      text-decoration: none;
      font-size: 12px;
    }
    .bundle-link:hover { text-decoration: underline; }
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: bold;
    }
    .badge-debug { background: #4ecdc4; color: #1a1a2e; }
    .badge-none { background: #444; color: #888; }
    .loading { text-align: center; padding: 40px; color: #888; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="./app.js"></script>
</body>
</html>
