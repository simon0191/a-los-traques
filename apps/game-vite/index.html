<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="screen-orientation" content="landscape" />
  <title>A Los Traques</title>
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="format-detection" content="telephone=no" />
  <link rel="manifest" href="/manifest.json" />
  <style>
    * {
      margin: 0;
      padding: 0;
      touch-action: none;
      -webkit-touch-callout: none;
      -webkit-user-select: none;
      user-select: none;
    }
    html, body {
      background: #000;
      overflow: hidden;
      width: 100%;
      height: 100%;
      overscroll-behavior: none;
      -webkit-overflow-scrolling: none;
    }
    #game-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      height: 100dvh;
    }
    canvas {
      display: block;
      image-rendering: pixelated;
    }

    /* Orientation lock message */
    #rotate-message {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, sans-serif;
      font-size: 24px;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      flex-direction: column;
    }

    @media (orientation: portrait) {
      #rotate-message { display: flex; }
      canvas { display: none !important; }
    }
  </style>
</head>
<body>
  <div id="rotate-message">
    <div style="font-size: 48px; margin-bottom: 16px;">📱↔️</div>
    <div>Gira tu dispositivo</div>
  </div>
  <div id="game-container"></div>
  <script>
    // Size game container to actual visible viewport (not behind browser chrome)
    var gc = document.getElementById('game-container');
    window.fixHeight = function fixHeight() {
      if (window._suppressFixHeight) return;
      var vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
      var vw = window.visualViewport ? window.visualViewport.width : window.innerWidth;
      gc.style.width = vw + 'px';
      gc.style.height = vh + 'px';
      // Tell Phaser to re-measure if game exists
      if (window.game && window.game.scale) window.game.scale.refresh();
    }
    window.fixHeight();
    window.addEventListener('resize', window.fixHeight);
    if (window.visualViewport) {
      window.visualViewport.addEventListener('resize', window.fixHeight);
    }
  </script>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
