<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unirse al Torneo - A Los Traques</title>
    <style>
        :root {
            --primary: #3366ff;
            --secondary: #1a1a3a;
            --bg: #0a0a1e;
            --accent: #ffcc00;
            --success: #44cc88;
            --error: #ff4444;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: var(--bg);
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            width: 100%;
            max-width: 350px;
            background: var(--secondary);
            padding: 25px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            border: 1px solid #333366;
        }
        h1 { color: #fff; margin: 0 0 5px 0; font-size: 22px; letter-spacing: 1px; }
        .room-tag { font-size: 10px; color: var(--accent); margin-bottom: 20px; text-transform: uppercase; font-weight: bold; }
        
        .tabs { display: flex; background: rgba(0,0,0,0.3); border-radius: 8px; margin-bottom: 20px; padding: 4px; }
        .tab { flex: 1; padding: 10px; cursor: pointer; border-radius: 6px; font-size: 12px; font-weight: bold; color: #888; transition: 0.2s; }
        .tab.active { background: var(--primary); color: white; }

        .form-group { margin-bottom: 15px; text-align: left; }
        input {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: 1px solid #333366;
            background: #0a0a1a;
            color: white;
            font-size: 14px;
            box-sizing: border-box;
            outline: none;
        }
        input:focus { border-color: var(--primary); }
        
        .btn {
            width: 100%;
            padding: 12px;
            border-radius: 6px;
            border: none;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: #4477ff; }
        .btn-google { background: white; color: black; }
        .btn-signup { background: var(--success); color: white; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }

        .status-msg { font-size: 11px; color: #aaa; margin-top: 10px; min-height: 15px; }
        .error { color: var(--error); }
        .success { color: var(--success); }
        .hidden { display: none !important; }
        
        hr { border: 0; border-top: 1px solid #333366; margin: 15px 0; }
    </style>
</head>
<body>
    <div class="container" id="main-container">
        <h1>TORNEO LOCAL</h1>
        <div id="room-info" class="room-tag">Conectando...</div>

        <div id="auth-ui">
            <div class="tabs">
                <div class="tab active" data-target="view-login">ENTRAR</div>
                <div class="tab" data-target="view-signup">REGISTRO</div>
                <div class="tab" data-target="view-guest">INVITADO</div>
            </div>

            <div id="status-display" class="status-msg"></div>

            <!-- Login -->
            <div id="view-login" class="auth-view">
                <div class="form-group">
                    <input type="email" id="login-email" placeholder="Email">
                </div>
                <div class="form-group">
                    <input type="password" id="login-pass" placeholder="Contraseña">
                </div>
                <button id="login-btn" class="btn btn-primary">ENTRAR Y UNIRSE</button>
                <hr>
                <button id="google-btn" class="btn btn-google">
                    <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.49h4.84c-.21.91-.81 1.68-1.63 2.25v1.87h2.63c1.54-1.41 2.43-3.5 2.43-5.77z" fill="#4285F4"/><path d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.63-1.87c-.73.49-1.66.78-2.63.78-2.33 0-4.3-1.58-5-3.71H2.01v1.93C3.49 15.92 6.05 18 9 18z" fill="#34A853"/><path d="M4 10.99c-.18-.54-.29-1.11-.29-1.7s.11-1.16.29-1.7V5.66H2.01C1.29 6.66 1 7.8 1 9s.29 2.34 1.01 3.34L4 10.99z" fill="#FBBC05"/><path d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.59C13.46.89 11.43 0 9 0 6.05 0 3.49 2.08 2.01 5.66L4 7.59c.7-2.13 2.67-3.71 5-3.71z" fill="#EA4335"/></svg>
                    CONTINUAR CON GOOGLE
                </button>
            </div>

            <!-- Signup -->
            <div id="view-signup" class="auth-view hidden">
                <div class="form-group">
                    <input type="text" id="sig-nick" placeholder="Apodo">
                </div>
                <div class="form-group">
                    <input type="email" id="sig-email" placeholder="Email">
                </div>
                <div class="form-group">
                    <input type="password" id="sig-pass" placeholder="Contraseña">
                </div>
                <button id="signup-btn" class="btn btn-signup">CREAR CUENTA</button>
            </div>

            <!-- Guest -->
            <div id="view-guest" class="auth-view hidden">
                <div class="form-group">
                    <input type="text" id="guest-name" placeholder="Tu Apodo (Ej: Simon)">
                </div>
                <button id="guest-btn" class="btn btn-primary">UNIRSE COMO INVITADO</button>
            </div>
        </div>
    </div>

    <script type="module">
        import PartySocket from 'https://cdn.jsdelivr.net/npm/partysocket@1.1.16/+esm';
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.101.1/+esm';

        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room');
        if (roomId) roomId = roomId.toLowerCase();
        const tourneyId = urlParams.get('tourney');

        let supabase = null;
        let lobbyState = null;
        const statusEl = document.getElementById('status-display');
        
        // Handshake state
        let currentHandshakeTid = null;
        let handshakeSucceeded = false;

        // 1. Fetch Public Config & Initialize
        async function init() {
            if (!roomId) {
                document.getElementById('room-info').innerText = "ERROR: NO SE ENCONTRÓ SALA";
                document.getElementById('auth-ui').classList.add('hidden');
                return;
            }

            try {
                const resp = await fetch('/api/public-config');
                const config = await resp.json();
                
                if (config.supabaseUrl && config.supabaseAnonKey) {
                    supabase = createClient(config.supabaseUrl, config.supabaseAnonKey);
                    
                    // Check session
                    const { data } = await supabase.auth.getSession();
                    if (data.session) {
                        const user = data.session.user;
                        const name = user.user_metadata?.nickname || user.email.split('@')[0];
                        showAutoJoinUI(name, user.id);
                        // Trigger handshake check after login
                        checkAndPerformHandshake();
                    }
                } else {
                    hideAuthTabs();
                }
            } catch (e) {
                console.warn("Config fetch failed, using guest-only mode", e);
                hideAuthTabs();
            }

            initPartyKit();
        }

        function hideAuthTabs() {
            document.querySelectorAll('.tab').forEach(t => {
                if (t.dataset.target !== 'view-guest') t.classList.add('hidden');
                else t.click(); // Auto-switch to guest
            });
        }

        function initPartyKit() {
            const isLocal = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1';
            const partyHost = isLocal ? 'localhost:1999' : 'a-los-traques.simon0191.partykit.dev';
            
            document.getElementById('room-info').innerText = `SALA: ${roomId}`;
            
            const socket = new PartySocket({ 
                host: partyHost, 
                room: roomId
            });

            socket.onopen = () => socket.send(JSON.stringify({ type: 'request_lobby_update' }));
            socket.onmessage = (e) => {
                const data = JSON.parse(e.data);
                if (data.type === 'lobby_update' || data.type === 'init_tournament') {
                    lobbyState = data.lobbyState;
                    checkAndPerformHandshake();
                }
            };

            // Expose socket for join function
            window.lobbySocket = socket;
        }

        async function checkAndPerformHandshake() {
            const tid = lobbyState?.tourneyId || tourneyId;
            if (!tid || !supabase) return false;

            // Reset if tournament ID changed
            if (currentHandshakeTid !== tid) {
                currentHandshakeTid = tid;
                handshakeSucceeded = false;
            }

            if (handshakeSucceeded) return true;

            const { data: { session } } = await supabase.auth.getSession();
            const token = session?.access_token;
            if (!token) return false;

            try {
                const resp = await fetch('/api/tournament/join', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ tourneyId: tid })
                });
                
                if (resp.ok) {
                    handshakeSucceeded = true;
                    console.log(`Tournament handshake successful for ${tid}`);
                    
                    // If we were already joined, update the Host with our verified status
                    const mySlot = lobbyState?.slots?.find(s => s?.id === (session.user.id));
                    if (mySlot && !mySlot.handshake) {
                        const name = session.user.user_metadata?.nickname || session.user.email.split('@')[0];
                        window.lobbySocket.send(JSON.stringify({ 
                            type: 'lobby_action', 
                            action: 'JOIN_SLOT', 
                            payload: { name, id: session.user.id, type: 'human', handshake: true } 
                        }));
                    }
                    
                    return true;
                } else {
                    const errData = await resp.json();
                    console.warn(`Tournament handshake failed for ${tid}`, errData);
                    return false;
                }
            } catch (e) {
                console.warn(`Handshake error for ${tid}`, e);
                return false;
            }
        }

        init();

        // Tab Switching
        document.querySelectorAll('.tab').forEach(tab => {
            tab.onclick = () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                document.querySelectorAll('.auth-view').forEach(v => v.classList.add('hidden'));
                tab.classList.add('active');
                document.getElementById(tab.dataset.target).classList.remove('hidden');
                statusEl.innerText = "";
            };
        });

        // ACTIONS
        async function join(name, id = null, type = 'guest') {
            if (!lobbyState) return showStatus("Error: Esperando al servidor...", true);

            setLoading(true);
            showStatus("Uniéndose...", false);

            // Phase 4: Persistence Handshake
            let handshakeOk = false;
            // Ensure handshake is complete before sending JOIN_SLOT if authenticated
            if (type === 'human' && id && supabase) {
                try {
                    handshakeOk = await checkAndPerformHandshake();
                } catch (e) {
                    console.warn("Handshake failed, continuing as guest/unverified", e);
                }
            }

            window.lobbySocket.send(JSON.stringify({ 
                type: 'lobby_action', 
                action: 'JOIN_SLOT', 
                payload: { name, id, type, handshake: handshakeOk } 
            }));
            
            const container = document.getElementById('main-container');
            container.innerHTML = ''; // Clear

            const h1 = document.createElement('h1');
            h1.style.color = 'var(--success)';
            h1.textContent = '¡LISTO!';

            const roomTag = document.createElement('div');
            roomTag.className = 'room-tag';
            roomTag.textContent = `${name.toUpperCase()} REGISTRADO`;

            const p = document.createElement('p');
            p.style.fontSize = '13px';
            p.style.color = '#aaa';
            p.textContent = 'Ya estás en el torneo. Puedes cerrar esta pestaña o registrar a alguien más.';

            const btn = document.createElement('button');
            btn.className = 'btn btn-primary';
            btn.textContent = 'REGISTRAR A OTRA PERSONA';
            btn.onclick = async () => {
                if (supabase) await supabase.auth.signOut();
                location.reload();
            };

            container.append(h1, roomTag, p, btn);
        }

        document.getElementById('login-btn').onclick = async () => {
            if (!supabase) return;
            const email = document.getElementById('login-email').value;
            const pass = document.getElementById('login-pass').value;
            if (!email || !pass) return showStatus("Completa los campos", true);
            
            setLoading(true);
            const { data, error } = await supabase.auth.signInWithPassword({ email, password: pass });
            if (error) {
                showStatus(error.message, true);
                setLoading(false);
            } else {
                const nick = data.user.user_metadata?.nickname || email.split('@')[0];
                join(nick, data.user.id, 'human');
            }
        };

        document.getElementById('signup-btn').onclick = async () => {
            if (!supabase) return;
            const nick = document.getElementById('sig-nick').value;
            const email = document.getElementById('sig-email').value;
            const pass = document.getElementById('sig-pass').value;
            if (!nick || !email || !pass) return showStatus("Completa los campos", true);

            setLoading(true);
            const { data, error } = await supabase.auth.signUp({ 
                email, password: pass, options: { data: { nickname: nick } } 
            });
            if (error) {
                showStatus(error.message, true);
                setLoading(false);
            } else {
                showStatus("¡Cuenta creada! Revisa tu email para verificar.", false);
                setLoading(false);
            }
        };

        document.getElementById('google-btn').onclick = () => {
            if (!supabase) return;
            supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: window.location.href }
            });
        };

        document.getElementById('guest-btn').onclick = () => {
            const name = document.getElementById('guest-name').value.trim();
            if (!name) return showStatus("Escribe un nombre", true);
            join(name);
        };

        // Helpers
        function showStatus(msg, isError) {
            statusEl.innerText = msg;
            statusEl.className = 'status-msg ' + (isError ? 'error' : 'success');
        }

        function setLoading(loading) {
            document.querySelectorAll('button').forEach(b => b.disabled = loading);
            if (loading) showStatus("Procesando...", false);
        }

        function showAutoJoinUI(name, id) {
            const authUi = document.getElementById('auth-ui');
            authUi.innerHTML = ''; // Clear

            const wrapper = document.createElement('div');
            wrapper.style.margin = '20px 0';

            const label = document.createElement('div');
            label.style.fontSize = '14px';
            label.style.color = '#aaa';
            label.style.marginBottom = '10px';
            label.textContent = 'Sesión activa como';

            const nameDiv = document.createElement('div');
            nameDiv.style.fontSize = '20px';
            nameDiv.style.fontWeight = 'bold';
            nameDiv.style.color = 'var(--accent)';
            nameDiv.style.marginBottom = '20px';
            nameDiv.textContent = name.toUpperCase();

            const joinBtn = document.createElement('button');
            joinBtn.className = 'btn btn-primary';
            joinBtn.textContent = 'UNIRSE AL TORNEO';
            joinBtn.onclick = () => join(name, id, 'human');

            const logoutBtn = document.createElement('button');
            logoutBtn.className = 'btn';
            logoutBtn.style.background = 'none';
            logoutBtn.style.color = '#666';
            logoutBtn.style.fontSize = '11px';
            logoutBtn.textContent = 'CERRAR SESIÓN';
            logoutBtn.onclick = async () => {
                await supabase.auth.signOut();
                location.reload();
            };

            wrapper.append(label, nameDiv, joinBtn, logoutBtn);
            authUi.appendChild(wrapper);
        }
    </script>
</body>
</html>
