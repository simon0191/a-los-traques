name: E2E Tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: npx playwright install chromium --with-deps
      - run: bun run test:e2e
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-test-results
          path: test-results/
          retention-days: 7
      - name: Comment failure summary on PR
        if: failure() && github.event_name == 'pull_request'
        run: |
          REPORT=$(find test-results -name '*-report.md' -print -quit 2>/dev/null)
          if [ -n "$REPORT" ]; then
            # Extract key info from report for a short summary
            FIGHTERS=$(grep -A1 'P1 Fighter' "$REPORT" | tail -1 | sed 's/.*| //' | sed 's/ |//')
            P1=$(grep 'P1 Fighter' "$REPORT" | sed 's/.*| //' | sed 's/ |//')
            P2=$(grep 'P2 Fighter' "$REPORT" | sed 's/.*| //' | sed 's/ |//')
            VERDICT=$(grep -A2 '### Determinism' "$REPORT" | tail -1)
            DESYNCS_P1=$(grep 'Desyncs' "$REPORT" | sed 's/.*| //' | awk -F'|' '{print $1}' | xargs)
            DESYNCS_P2=$(grep 'Desyncs' "$REPORT" | sed 's/.*| //' | awk -F'|' '{print $2}' | xargs)
            RUN_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            gh pr comment ${{ github.event.pull_request.number }} --body "$(cat <<EOF
          :x: **E2E multiplayer test failed** — ${P1} vs ${P2}
          ${VERDICT}
          Desyncs: P1=${DESYNCS_P1}, P2=${DESYNCS_P2}
          [Full report & replay bundle](${RUN_URL}#artifacts) (download \`e2e-test-results\` artifact)
          EOF
          )"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
